<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conversor de Coordenadas SBO</title>
    <!-- Tu CSS actual -->
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/proj4js/2.8.0/proj4.js"></script>
    <style>
        /* Pequeño ajuste CSS para el nuevo selector dentro de la tarjeta UTM */
        .utm-controls { display: flex; gap: 10px; margin-bottom: 5px; }
        .utm-controls select { padding: 5px; border-radius: 4px; border: 1px solid #ccc; font-family: inherit;}
    </style>
</head>
<body>
    <div class="container">
        <div class="header-excel">
            <div class="logo-placeholder">SBO</div>
            <h2>Conversor de Coordenadas Full (Global)</h2>
        </div>

        <div class="inputs-container">
            <div class="input-card">
                <label>📍 Grados Decimales (Lat, Lon)</label>
                <textarea id="inputDecimal" rows="5" placeholder="Ejemplo:&#10;10.5041350  -66.9017070"></textarea>
                <button onclick="procesarDecimales()" class="btn-convert">Convertir a UTM</button>
            </div>

            <div class="input-card">
                <label>🗺️ UTM (Este, Norte, Zona)</label>
                <div class="utm-controls">
                    <label for="hemisferioUTM" style="align-self: center; font-size: 0.9em;">Hemisferio:</label>
                    <select id="hemisferioUTM">
                        <option value="N">Norte (N)</option>
                        <option value="S">Sur (S)</option>
                    </select>
                </div>
                <textarea id="inputUTM" rows="5" placeholder="Ejemplo:&#10;729648  1161919  19"></textarea>
                <button onclick="procesarUTM()" class="btn-convert btn-utm">Convertir a Decimales</button>
            </div>
        </div>

        <div class="actions-main">
            <button onclick="limpiarTabla()" class="btn-clear">Limpiar Todo</button>
        </div>

        <!-- El resto de tu tabla HTML se mantiene exactamente igual -->
        <div class="table-wrapper">
            <table id="resultTable">
                <thead>
                    <tr>
                        <th class="main-header">#</th>
                        <th colspan="2" class="main-header">
                            Grados decimales
                            <button class="btn-copy-small" onclick="copiarDecimales()">Copiar</button>
                        </th>
                        <th colspan="4" class="main-header">
                            UTM (WGS84)
                            <div class="btn-group-copy">
                                <button class="btn-copy-small" onclick="copiarUTM('XY')">Copiar X/Y</button>
                                <button class="btn-copy-small" onclick="copiarUTM('XYZ')">Copiar X/Y/Z</button>
                            </div>
                        </th>
                        <th colspan="2" class="main-header">GMS</th>
                        <th class="main-header">Garmin</th>
                    </tr>
                    <tr class="sub-header">
                        <th>N°</th>
                        <th>Latitud</th>
                        <th>Longitud</th>
                        <th>Este (X)</th>
                        <th>Norte (Y)</th>
                        <th>Zona</th>
                        <th>Banda</th>
                        <th>Latitud</th>
                        <th>Longitud</th>
                        <th>Waypoint</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
